<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Voyageur</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    text-align: center;
    transition: background 0.5s;
}

/* Background dynamique */
body.custom-bg {
    background-size: cover;
    background-position: center;
}

.container {
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.5);
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    margin-top: 20px;
}

h1 {
    margin-bottom: 5px;
}

button {
    width: 90%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-guide { background: #ff4d4d; }
.btn-hotel { background: #00cc66; }
.btn-activity { background: #ffaa00; }

button:hover {
    transform: scale(1.05);
}

/* Upload image */
.upload-box {
    margin-top: 15px;
}

input[type="file"] {
    display: none;
}

.label-upload {
    display: inline-block;
    padding: 10px 20px;
    background: #0072ff;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <h1 id="agence">Agence</h1>
    <p id="voyageur">Chargement...</p>

    <div class="card">
        <h2>📍 Activités</h2>
        <div id="activities"></div>
    </div>

    <div class="card">
        <h2>🆘 Assistance</h2>
        <button class="btn-guide" onclick="callGuide()">📞 Appeler le guide</button>
        <button class="btn-hotel" onclick="goHotel()">🏨 Retour à l'hôtel</button>
        <button style="background:#25D366;" onclick="sendLocation()">
📍 Je suis perdu
</button>
    </div>

    <div class="card">
        <h2>🎨 Personnaliser le fond</h2>
        <div class="upload-box">
            <label class="label-upload">
                📷 Choisir une image
                <input type="file" accept="image/*" onchange="changeBackground(event)">
            </label>
        </div>
    </div>

</div>

<script>

// 🔗 Récupération ID
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// ⚠️ Remplace ici par ton lien Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbxsNeqnfHX-zdJQtcboooK5S6D9d0d5c-MdO8mIizYhg4eSRjSGhcBZyyS7x2KOIvz3/exec?id=" + id;

// 📡 Chargement données
fetch(API_URL)
.then(res => res.json())
.then(data => {

    if(data.error){
        document.getElementById("voyageur").innerText = "Voyageur introuvable";
        return;
    }

    document.getElementById("voyageur").innerText = data.prenom + " " + data.nom;
    document.getElementById("agence").innerText = data.agence;

    const activities = data.activites.split(",");
    const container = document.getElementById("activities");

    activities.forEach(act => {
        const btn = document.createElement("button");
        btn.className = "btn-activity";
        btn.innerText = act;
        container.appendChild(btn);
    });

    // 📞 Appel guide
    window.callGuide = () => {
        window.location.href = "tel:" + data.guide;
    };

    // 🏨 Retour hôtel
    window.goHotel = () => {
        window.location.href = "https://www.google.com/maps/search/?api=1&query=" + data.hotel;
    };

  
});

// 🎨 Changer background
function changeBackground(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {
        document.body.style.backgroundImage = `url(${e.target.result})`;
        document.body.classList.add("custom-bg");

        // sauvegarde local (important)
        localStorage.setItem("backgroundImage", e.target.result);
    };

    reader.readAsDataURL(file);
}

// 🔁 Charger background sauvegardé
window.onload = () => {
    const savedBg = localStorage.getItem("backgroundImage");
    if (savedBg) {
        document.body.style.backgroundImage = `url(${savedBg})`;
        document.body.classList.add("custom-bg");
    }
};

</script>

</body>
</html>
